name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Start server
        working-directory: ./backend
        run: node server.js &

      - name: Wait for server
        run: sleep 5

      - name: Run test
        working-directory: ./backend
        run: node test.js